<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mine Podcast Rankings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Personlig rangliste</p>
        <h1>Mine podcastfavoritter</h1>
        <p class="intro">
          En kurateret oversigt over podcasts, jeg faktisk har lyttet til,
          rangeret, gemt og vendt tilbage til. Brug søgning, filtre og sortering
          til at udforske listen.
        </p>
        <div class="hero-note">
          <span>Sorteres som standard efter placering</span>
          <span>Filtrer på genre og udgiver</span>
        </div>
      </header>

      <main>
        <section class="controls" aria-label="Filtre og sortering">
          <label class="search-field">
            <span>Søg</span>
            <input
              type="search"
              id="searchInput"
              placeholder="Søg efter titel eller vært"
            />
          </label>

          <label class="filter-field">
            <span>Genre</span>
            <select id="genreFilter">
              <option value="">Alle genrer</option>
            </select>
          </label>

          <label class="filter-field">
            <span>Udgiver</span>
            <select id="publisherFilter">
              <option value="">Alle udgivere</option>
            </select>
          </label>

          <label class="sort-field">
            <span>Sorter efter</span>
            <select id="sortSelect">
              <option value="placement-asc">Placering, lavest først</option>
              <option value="placement-desc">Placering, højest først</option>
              <option value="rating-desc">Vurdering, højest først</option>
              <option value="rating-asc">Rating, lavest først</option>
              <option value="title-asc">Titel, A-Å</option>
              <option value="title-desc">Titel, Å-A</option>
              <option value="playedYear-desc">Årstal afspillet, nyeste først</option>
              <option value="playedYear-asc">Årstal afspillet, ældste først</option>
            </select>
          </label>
        </section>

        <section class="summary" aria-live="polite">
          <p id="resultsText">Indlæser podcasts...</p>
        </section>

        <section
          id="podcastGrid"
          class="podcast-grid"
          aria-label="Podcastoversigt"
        ></section>

        <template id="podcastCardTemplate">
          <article class="podcast-card">
            <div class="card-rank">
              <p class="placement-label">Placering</p>
              <p class="placement"></p>
            </div>
            <div class="card-top">
              <p class="genre"></p>
              <p class="rating"></p>
            </div>
            <h2 class="title"></h2>
            <p class="host"></p>
            <dl class="meta">
              <div>
                <dt>Udgiver</dt>
                <dd class="publisher"></dd>
              </div>
              <div>
                <dt>Årstal afspillet</dt>
                <dd class="played-year"></dd>
              </div>
              <div>
                <dt>Antal afsnit</dt>
                <dd class="episodes"></dd>
              </div>
            </dl>
            <div class="card-footer">
              <button class="podcast-link" type="button">Åbn link</button>
            </div>
          </article>
        </template>
      </main>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
